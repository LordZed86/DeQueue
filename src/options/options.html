<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeQueue — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <header>
      <span class="logo">DeQueue</span>
      <span class="logo-sub">Settings</span>
    </header>

    <main>
      <!-- ── Session defaults ──────────────────────────────── -->
      <section class="card">
        <h2>Session defaults</h2>

        <label for="default-budget">Default time budget (minutes)</label>
        <input id="default-budget" type="number" min="1" max="120" value="20" />

        <label for="default-mood">Default mood</label>
        <select id="default-mood">
          <option value="">None</option>
          <option value="focus">Focus</option>
          <option value="low-energy">Low energy</option>
          <option value="curious">Curious</option>
          <option value="fun">Fun</option>
        </select>
      </section>

      <!-- ── Scoring weights ───────────────────────────────── -->
      <section class="card">
        <h2>Priority weights</h2>
        <p class="hint">Control how the algorithm ranks items. Values are relative — they are normalized automatically.</p>

        <label>
          Interest
          <span class="weight-value" id="val-interest">50%</span>
        </label>
        <input id="weight-interest" type="range" min="0" max="100" value="50" />

        <label>
          Recency (new items)
          <span class="weight-value" id="val-recency">10%</span>
        </label>
        <input id="weight-recency" type="range" min="0" max="100" value="10" />

        <label>
          Staleness (old items)
          <span class="weight-value" id="val-staleness">30%</span>
        </label>
        <input id="weight-staleness" type="range" min="0" max="100" value="30" />

        <label>
          Mood match
          <span class="weight-value" id="val-mood">10%</span>
        </label>
        <input id="weight-mood" type="range" min="0" max="100" value="10" />
      </section>

      <div class="actions">
        <span id="save-status" class="save-status"></span>
        <button id="btn-reset" class="btn-ghost">Reset to defaults</button>
        <button id="btn-save" class="btn-primary">Save settings</button>
      </div>
    </main>

    <footer class="feedback-footer">
      Have feedback?
      <a href="https://github.com/LordZed86/DeQueue/issues/new?template=feedback.yml" target="_blank" rel="noopener">Open a GitHub issue</a>
      or
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSemYri-EzlVDvgs0OAzkBnv5rYtge7FBpnQjNk3kjsmpKbcJw/viewform?usp=header" target="_blank" rel="noopener">fill out this short form</a>
      — no GitHub account needed.
    </footer>

    <script type="module" src="options.js"></script>
  </body>
</html>

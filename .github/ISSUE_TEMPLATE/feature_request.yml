name: Feature request
description: Suggest an idea or enhancement for DeQueue
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [Planned features](../../blob/main/README.md#planned-features) list
        in the README first — your idea may already be tracked there.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's the use case or pain point?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
